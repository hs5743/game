<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>學習村 RPG</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient" aria-hidden="true"></div>
    <main class="game-shell">
      <section class="play-area" aria-label="學習村 RPG 遊戲區">
        <div class="game-title">
          <span>Chapter 1</span>
          <strong>學習村</strong>
        </div>
        <canvas id="game" width="960" height="640"></canvas>
        <div class="toast">北門通往森林，東門通往農田</div>
        <div id="dialog" class="dialog hidden" role="status" aria-live="polite"></div>
        <div id="quiz" class="quiz hidden" role="dialog" aria-modal="true" aria-labelledby="quizTitle">
          <h2 id="quizTitle">知識挑戰</h2>
          <p id="quizQuestion"></p>
          <div id="quizOptions" class="quiz-options"></div>
        </div>
      </section>

      <aside class="hud" aria-label="遊戲資訊">
        <div class="quest-card">
          <p class="label">任務</p>
          <h1>學習村 RPG</h1>
          <p id="questText">和學習村的林老師對話，開始探索村莊、森林與農田。</p>
        </div>

        <div class="stats">
          <div>
            <span>知識碎片</span>
            <strong id="shards">0 / 4</strong>
          </div>
          <div>
            <span>勇氣</span>
            <strong id="hearts">3</strong>
          </div>
          <div>
            <span>任務進度</span>
            <strong id="progress">開始</strong>
          </div>
        </div>

        <div class="controls">
          <p class="label">操作</p>
          <p><kbd>方向鍵</kbd><kbd>WASD</kbd> 移動</p>
          <p><kbd>Space</kbd> 互動與挑戰</p>
          <p>發光出口可以切換地圖</p>
        </div>

        <button id="restart" type="button">重新開始</button>
      </aside>
    </main>

    <script src="game.js"></script>
  </body>
</html>
