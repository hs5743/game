<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雙語字卡學習村 RPG</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient" aria-hidden="true"></div>
    <main class="game-shell">
      <section class="play-area" aria-label="雙語字卡學習村 RPG">
        <div class="game-title">
          <span>Chapter 1</span>
          <strong>學習村廣場</strong>
        </div>
        <canvas id="game" width="960" height="640"></canvas>
        <div class="toast">收集 24 張雙語字卡，探索村莊、森林與農田</div>
        <div id="dialog" class="dialog hidden" role="status" aria-live="polite"></div>
        <div id="quiz" class="quiz hidden" role="dialog" aria-modal="true" aria-labelledby="quizTitle">
          <div class="quiz-card-preview">
            <img id="quizCardImage" src="assets/cards/card-01.jpg" alt="" />
            <div>
              <p id="quizCardMeta"></p>
              <h2 id="quizTitle">字卡挑戰</h2>
            </div>
          </div>
          <p id="quizQuestion"></p>
          <div id="quizOptions" class="quiz-options"></div>
        </div>
      </section>

      <aside class="hud" aria-label="遊戲資訊">
        <div class="quest-card">
          <p class="label">任務</p>
          <h1>雙語字卡學習村</h1>
          <p id="questText">找村長開始旅程，探索每張發光字卡，完成品格與情緒詞彙挑戰。</p>
        </div>

        <div class="active-card">
          <img id="cardImage" src="assets/cards/card-01.jpg" alt="字卡預覽" />
          <div>
            <p class="label">目前主題</p>
            <strong id="cardName">Honesty 誠實</strong>
            <span id="cardHint">靠近發光字卡，按 Space 開始挑戰。</span>
          </div>
        </div>

        <div class="stats">
          <div>
            <span>已收集字卡</span>
            <strong id="shards">0 / 24</strong>
          </div>
          <div>
            <span>勇氣心</span>
            <strong id="hearts">3</strong>
          </div>
          <div>
            <span>所在區域</span>
            <strong id="progress">學習村廣場</strong>
          </div>
        </div>

        <div class="collection">
          <p class="label">字卡圖鑑</p>
          <div id="collectionGrid" class="collection-grid" aria-label="已收集字卡進度"></div>
        </div>

        <div class="controls">
          <p class="label">操作</p>
          <p><kbd>方向鍵</kbd><kbd>WASD</kbd> 移動</p>
          <p><kbd>Space</kbd> 對話、挑戰字卡</p>
          <p>踩上發光出口可切換地圖。</p>
        </div>

        <button id="restart" type="button">重新開始</button>
      </aside>
    </main>

    <script src="card-art.js"></script>
    <script src="game.js"></script>
  </body>
</html>
